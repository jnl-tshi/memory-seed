schema_version: 1
# Project-local controlled topic vocabulary (memory-trace-topic-neighbourhoods-plan.md).
# Derived 2026-07-10 from the slugs already authored across 50 session entries, consolidated to
# 21 canonical topics with every observed slug preserved as canonical or alias (user-approved);
# 2026-07-12 added Memory Trace UI and core Memory Seed slugs used by later entries.
# Deploy-once: `memory-seed update` never overwrites this file. Aliases resolve at read time;
# `memory-seed topics check` errors only on slugs found in neither column.
# 2026-07-19 added security and performance (user-approved): both were already in use by merged
# entries (the OpenSSF slice and the fork-point memo) and had no home in the vocabulary.
