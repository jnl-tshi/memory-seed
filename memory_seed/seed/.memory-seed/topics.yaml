schema_version: 1
# Project-local controlled topic vocabulary. Meaningful session entries carry 1-3 `topics:` slugs
# drawn from this index; `memory-seed topics check` validates entries against it. This file is
# deploy-once project-local state: `memory-seed update` never overwrites it - curate it for your
# project (add topics as durable themes emerge; prefer renaming via `aliases:` over deleting).
# A slug must match ^[a-z0-9][a-z0-9_-]{0,63}$.
