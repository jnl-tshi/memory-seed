    description: Defect repairs and corrections.
    status: active
    aliases: []
  - slug: documentation
    label: Documentation
    description: README, docs, and public-facing accuracy.
    status: active
    aliases: []
  - slug: release
    label: Release
    description: Version cuts, packaging, and publishing.
    status: active
    aliases: []
  - slug: workflow
