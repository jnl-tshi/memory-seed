name: Verify

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  python:
    name: Python and Memory Trace
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install core test dependencies
        run: python -m pip install -e . pytest

      - name: Run core tests
        run: python -m pytest tests

      - name: Validate repository session links
        run: python -m memory_seed.cli links check

      - name: Install package with Trace extra
        run: python -m pip install -e ".[trace]"

      - name: Run Memory Trace tests
        run: python -m unittest discover -s memory-trace/tests -p "test_*.py"

  react:
    name: React workspace
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: memory-trace/client

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: memory-trace/client/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check React source
        run: npm run typecheck

      - name: Build packaged React assets
        run: npm run build

      - name: Verify packaged React assets are current
        working-directory: .
        run: git diff --exit-code -- memory-trace/memory_trace/static/react
