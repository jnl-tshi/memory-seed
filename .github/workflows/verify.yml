name: Verify

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  python:
    name: Python and Memory Trace
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # links check validates session-entry commit refs against history;
          # a depth-1 clone would make every historical ref look unknown.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install core test dependencies
        run: python -m pip install -e . pytest

      - name: Run core tests
        run: python -m pytest tests

      - name: Validate repository session links
        run: python -m memory_seed.cli links check

      - name: Validate docs lifecycle
        run: python -m memory_seed.cli docs check

      - name: Validate docs index is current
        run: python -m memory_seed.cli docs index --check

      - name: Install package with Trace extra
        run: python -m pip install -e ".[trace]"

      - name: Run Memory Trace tests
        run: python -m unittest discover -s memory-trace/tests -p "test_*.py"

  react:
    name: React workspace
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: memory-trace/client

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: memory-trace/client/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check React source
        run: npm run typecheck

      # node:test with no runner dependency: the suites are TypeScript and rely
      # on Node's native type stripping, which is on by default from 22.18.
      - name: Run React unit tests
        run: npm test

      # Parse every diagram-sidecar Mermaid block through real Mermaid, so an
      # unrenderable diagram fails the build even if the local pre-commit hook
      # was bypassed. links check validates a sidecar's structure but never its
      # Mermaid; this is that gap's backstop. Needs jsdom + mermaid, both
      # installed by npm ci above.
      - name: Lint diagram-sidecar Mermaid
        run: npm run lint:sidecars

      - name: Build packaged React assets
        run: npm run build

      - name: Verify packaged React assets are current
        working-directory: .
        run: git diff --exit-code -- memory-trace/memory_trace/static/react
